theme = "dark_plus"

[editor]
line-number = "relative"
true-color = true
idle-timeout = 0
bufferline = "multiple"

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false

[keys.insert]
# move lines with alt up/down
A-down = ["extend_to_line_bounds", "delete_selection", "paste_after", "move_line_down"]
A-up = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before", "move_line_up"]

"C-left" = "move_prev_long_word_start"
"C-right" = "move_next_long_word_start"

# duplicate line and save into d register
# (avoids cluttering default register)
C-d = '@X"dy"dp'

# movement
C-end = "goto_file_end"
C-home = "goto_file_start"

[keys.normal]
# switch between buffers
tab = "goto_next_buffer"
S-tab = "goto_previous_buffer"

C-d = '@X"dy"dp'

# movement
C-end = "goto_file_end"
C-home = "goto_file_start"
